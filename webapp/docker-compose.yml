# Rebar Detection Web Application - Docker Compose Configuration
#
# Usage:
#   CPU only:     docker-compose up
#   With GPU:     docker-compose --profile gpu up

version: '3.8'

services:
  rebar-detector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_TAG: cpu
    container_name: rebar-detector-app
    ports:
      - "8000:8000"
    volumes:
      - ../model:/app/model:ro
      - ./results:/app/results
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # GPU-enabled service
  rebar-detector-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_TAG: cu121
    container_name: rebar-detector-gpu
    ports:
      - "8000:8000"
    volumes:
      - ../model:/app/model:ro
      - ./results:/app/results
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
